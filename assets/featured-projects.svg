    <text x="105" y="42" fill="#67E8F9" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Main project</text>
    <text x="20" y="104" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">LockerOps Platform</text>
    <text x="20" y="137" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="14">Smart locker management platform for physical locker stations,</text>
    <text x="20" y="159" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="14">reservations, access codes, kiosk flows, and operational workflows.</text>
    <text x="20" y="194" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Java | Spring Boot | PostgreSQL | REST APIs | OpenAPI</text>
    <rect x="20" y="214" width="86" height="26" rx="13" fill="#111827" stroke="#1F2937"/>
    <text x="36" y="232" fill="#A7F3D0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Backend</text>
