<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Featured Projects</title>
  <desc id="desc">A modern dark showcase of four featured engineering projects: LockerOps Platform, VoIP Platform, Raspberry Pi Home Server, and LockerOps Kiosk Frontend.</desc>
  <rect width="1200" height="780" rx="28" fill="#0B1020"/>
  <rect x="1" y="1" width="1198" height="778" rx="27" stroke="#1F2937" stroke-width="2"/>
