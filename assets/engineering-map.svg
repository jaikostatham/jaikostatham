    <rect x="18" y="170" width="178" height="26" rx="13" fill="#172554"/>
    <text x="34" y="188" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Infrastructure &amp; Operations</text>
    <text x="18" y="224" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Docker, Linux, Kubernetes, CI/CD</text>
    <text x="18" y="250" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="13">DigitalOcean, platform operation, deployment awareness</text>

    <rect x="552" y="152" width="520" height="124" rx="16" fill="#0F172A" stroke="#1F2937"/>
    <rect x="570" y="170" width="162" height="26" rx="13" fill="#2E1B3F"/>
    <text x="586" y="188" fill="#C4B5FD" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Frontend &amp; Client Apps</text>
    <text x="570" y="224" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Vue, Quasar, TypeScript, Flutter</text>
    <text x="570" y="250" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Dart, dashboards, kiosk-oriented interfaces</text>

