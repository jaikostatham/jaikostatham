    <text x="480" y="54" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Services / rules</text>

    <path d="M634 37H676" stroke="#334155" stroke-width="2"/>
    <path d="M676 37L667 31V43L676 37Z" fill="#334155"/>

