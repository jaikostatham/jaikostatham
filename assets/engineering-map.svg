  <g transform="translate(72 716)">
    <circle cx="7" cy="7" r="7" fill="#22D3EE"/>
    <text x="24" y="12" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="13">System thinking across product, code, data, infrastructure, and operation.</text>
