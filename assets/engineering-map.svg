<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Engineering Map</title>
  <desc id="desc">A visual engineering dashboard showing an end-to-end platform view from user interface to REST API, business logic, PostgreSQL, infrastructure, and operations.</desc>
  <rect width="1200" height="760" rx="28" fill="#0B1020"/>
  <rect x="1" y="1" width="1198" height="758" rx="27" stroke="#1F2937" stroke-width="2"/>
  <path d="M0 662C120 622 246 630 362 662C498 700 610 718 752 674C900 628 1012 590 1200 632V760H0V662Z" fill="#0F766E" fill-opacity="0.16"/>
  <path d="M72 194H1128" stroke="#1F2937" stroke-width="1"/>

  <text x="72" y="68" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">Engineering Map</text>
  <text x="72" y="102" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="17">End-to-end platform view: user experience, APIs, data, infrastructure, and real operation.</text>
