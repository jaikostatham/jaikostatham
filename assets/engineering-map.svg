    <text x="710" y="54" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Relational data</text>

    <path d="M864 37H906" stroke="#334155" stroke-width="2"/>
    <path d="M906 37L897 31V43L906 37Z" fill="#334155"/>

