    <text x="570" y="72" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">PostgreSQL and relational modeling</text>
    <text x="570" y="98" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Transactional flows, consistency, data structure</text>

