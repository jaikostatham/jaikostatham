    <rect x="18" y="322" width="164" height="26" rx="13" fill="#2B2430"/>
    <text x="34" y="340" fill="#FBCFE8" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Systems &amp; Networking</text>
    <text x="18" y="376" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">WireGuard, VPN, Asterisk, PJSIP</text>
    <text x="18" y="402" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="13">VoIP, Raspberry Pi, VPS, secure network paths</text>

    <rect x="552" y="304" width="520" height="124" rx="16" fill="#0F172A" stroke="#1F2937"/>
    <rect x="570" y="322" width="144" height="26" rx="13" fill="#29311E"/>
    <text x="586" y="340" fill="#BEF264" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Architecture Focus</text>
    <text x="570" y="376" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Enterprise platforms and maintainability</text>
    <text x="570" y="402" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Scalability, observability, distributed systems, integration</text>
